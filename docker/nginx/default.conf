server {
    listen 80;
    listen [::]:80;
    server_name localhost flowforge.test;

    root /var/www/html/public;
    index index.php index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Character set
    charset utf-8;

    # Logging
    access_log /var/log/nginx/flowforge-access.log;
    error_log /var/log/nginx/flowforge-error.log;

    # Redirect root to /index.php
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Handle React frontend routes
    location ~ ^/(dashboard|workflows|webhooks|schedules|users|login|register) {
        try_files $uri /index.html?$query_string;
    }

    # API routes
    location /api {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    # Static files
    location ~* \.(jpg|jpeg|gif|png|css|js|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # PHP-FPM configuration
    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;

        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;

        # Timeout settings
        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny access to sensitive files
    location ~ /(?:\.env|\.git|composer\.json|composer\.lock|package\.json|package-lock\.json)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Laravel storage and bootstrap
    location ~ /(storage|bootstrap)/ {
        deny all;
        access_log off;
        log_not_found off;
    }
}