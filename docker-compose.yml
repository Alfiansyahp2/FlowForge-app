version: '3.9'

services:
  # Laravel Application (PHP-FPM)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flowforge-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./storage:/var/www/html/storage
      - ./bootstrap/cache:/var/www/html/bootstrap/cache
    environment:
      APP_NAME: FlowForge
      APP_ENV: production
      APP_DEBUG: 'false'
      APP_URL: http://localhost:8000
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-flowforge}
      DB_USERNAME: ${DB_USERNAME:-flowforge}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      BROADCAST_DRIVER: redis
    networks:
      - flowforge-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Nginx Web Server
  nginx:
    image: nginx:1.25-alpine
    container_name: flowforge-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./public:/var/www/html/public
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - flowforge-network
    depends_on:
      - app

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: flowforge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-flowforge}
      POSTGRES_USER: ${DB_USERNAME:-flowforge}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-flowforge} -d ${DB_DATABASE:-flowforge}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - flowforge-network

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: flowforge-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - flowforge-network

  # Laravel Horizon - Queue Worker Dashboard
  horizon:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flowforge-horizon
    restart: unless-stopped
    command: php artisan horizon
    working_dir: /var/www/html
    volumes:
      - ./storage:/var/www/html/storage
    environment:
      APP_ENV: production
      APP_DEBUG: 'false'
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-flowforge}
      DB_USERNAME: ${DB_USERNAME:-flowforge}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      BROADCAST_DRIVER: redis
    networks:
      - flowforge-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Laravel Scheduler
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flowforge-scheduler
    restart: unless-stopped
    command: php artisan schedule:work
    working_dir: /var/www/html
    volumes:
      - ./storage:/var/www/html/storage
    environment:
      APP_ENV: production
      APP_DEBUG: 'false'
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-flowforge}
      DB_USERNAME: ${DB_USERNAME:-flowforge}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
    networks:
      - flowforge-network
    depends_on:
      postgres:
        condition: service_healthy

  # Laravel Reverb - WebSocket Server
  reverb:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flowforge-reverb
    restart: unless-stopped
    command: php artisan reverb:start
    working_dir: /var/www/html
    ports:
      - "8080:8080"
    volumes:
      - ./storage:/var/www/html/storage
    environment:
      APP_ENV: production
      APP_DEBUG: 'false'
      REVERB_APP_ID: ${REVERB_APP_ID}
      REVERB_APP_KEY: ${REVERB_APP_KEY}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET}
      REVERB_HOST: "0.0.0.0"
      REVERB_PORT: 8080
      REVERB_SCHEME: http
      REDIS_HOST: redis
      REDIS_PORT: 6379
    networks:
      - flowforge-network
    depends_on:
      - redis

networks:
  flowforge-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local